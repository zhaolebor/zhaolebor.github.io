<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
	<meta http-equiv="Content-Type" content="text/html;charset=UTF-8"/>
	<title>Coupled Pendulum</title>
	<script type="text/javascript" src="raphael.js"></script>
	<script type="text/javascript" src="linear.js"></script>
	<link rel="stylesheet" type="text/css" href="style.css"/>
</head>
<body>
	<h2> Hello </h2>
<script>
	var k = 39.4 // N/m
	var l = 0.14 // m
	var M = 1.550 // kg
	var g = 9.81 // N/kg
	var r = 0.59 // m
	var gain1 = (k*l^2+M*g*r)/(M*r^2)
	var gain2 = (k*l^2)/(M*r^2)
	A=[[     0, 1,     0, 0],
   	   [-gain1, 0, gain2, 0],
       [     0, 0,     0, 1], 
       [ gain2, 0,-gain1, 0]];
   
    B=[];
    C=[[1,0,0,0],
       [0,0,1,0]];
    D=[];
    X=[0.0873,0,-0.0873,0];
    sys=system(A,B,C,D,X);
    sys.h(0.005)
    sys.tMax(20);
    plt=plot([500,150],sys,[0,1],[20,-0.1,0.1],['theta1','theta2'],['green','red']);
    
    //dia=diagram([100,30]);
	//dia.inductor([15,15],[85,15]);
	//dia.terminal([15,15],[85,15]);
</script>

</body>
</html>
