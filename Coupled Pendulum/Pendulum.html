<script>
	//var k = 39.4 // N/m
	//var l = 0.14 // m
	//var M = 1.550 // kg
	//var g = 9.81 // N/kg
	//var r = 0.59 // m
	//var gain1 = (k*l*l+M*g*r)/(M*r*r)
	//var gain2 = (k*(l*l))/(M*(r*r))
	//var Phi1_init   = 0.0873;
    //var Phi2_init   = 0.0873;

	A=[[     0, 1,     0, 0],
   	   [-gain1, 0, gain2, 0],
       [     0, 0, 0, 1], 
       [ gain2, 0,-gain1, 0]];
    B=[];
    C=[[1,0,0,0],
       [0,0,1,0]];
    D=[];
    X=[Phi1,0,Phi2,0];
    sys=system(A,B,C,D,X);
    sys.h(0.0001);
    sys.spf(100);
    sys.fps(100);
    sys.tMax(30);
    

    
    
    plt=plot([500,150],sys,[0,1],[30,-0.2,0.2],['theta1','theta2'],['green','red']);

</script>
